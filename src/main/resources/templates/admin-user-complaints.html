<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::div.content})}">
<head>
    <title>User Complaints</title>
</head>
<body class="bg-gray-50 p-6">
    <div class="content p-8 max-w-7xl mx-auto space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <!-- Header -->
        <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-8">
            <div class="space-y-1">
                <h1 class="text-3xl font-black tracking-tighter text-gray-900 dark:text-white uppercase">Grievance Repository</h1>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em]">System-Wide Operational Oversight</p>
            </div>
            
            <!-- Filter Bar -->
            <form method="get" class="flex flex-wrap items-center gap-4 bg-white dark:bg-gray-800 p-3 rounded-[2rem] border dark:border-gray-700 shadow-xl shadow-indigo-500/5 ring-1 ring-gray-100 dark:ring-gray-700">
                <div class="flex items-center gap-3 px-4 flex-1 min-w-[240px]">
                    <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" name="keyword" placeholder="Filter by intelligence keyword..." 
                           class="bg-transparent border-none focus:ring-0 text-[10px] font-black uppercase tracking-widest text-gray-900 dark:text-white w-full placeholder:text-gray-400"
                           th:value="${param.keyword}">
                </div>
                
                <div class="h-8 w-px bg-gray-100 dark:bg-gray-700 hidden sm:block"></div>
                       
                <select name="status" class="bg-transparent border-none focus:ring-0 text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400 pr-8 cursor-pointer">
                    <option value="">Global Lifecycle</option>
                    <option th:selected="${#strings.equals(param.status, 'New')}">New</option>
                    <option th:selected="${#strings.equals(param.status, 'Under Review')}">Under Review</option>
                    <option th:selected="${#strings.equals(param.status, 'Resolved')}">Resolved</option>
                    <option th:selected="${#strings.equals(param.status, 'Denied')}">Denied</option>
                </select>
                
                <button class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-8 py-3 rounded-2xl text-[9px] font-black uppercase tracking-[0.2em] hover:scale-105 active:scale-95 transition-all shadow-lg">Apply Protocol</button>
            </form>
        </div>

        <!-- Repository Table -->
        <div class="bg-white dark:bg-gray-800 rounded-[2.5rem] border dark:border-gray-700 shadow-2xl shadow-indigo-500/5 overflow-hidden ring-1 ring-gray-100 dark:ring-gray-700">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="bg-gray-50/50 dark:bg-gray-900/40 text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] border-b dark:border-gray-700">
                            <th class="px-8 py-6">ID</th>
                            <th class="px-8 py-6">Originator</th>
                            <th class="px-8 py-6">Intel Snippet</th>
                            <th class="px-8 py-6 text-center">Lifecycle</th>
                            <th class="px-8 py-6 text-center">SLA Pulse</th>
                            <th class="px-8 py-6">Agent assigned</th>
                            <th class="px-8 py-6 text-right">Intervention Suite</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                        <!-- EMPTY STATE -->
                        <tr th:if="${#lists.isEmpty(complaints)}">
                            <td colspan="6" class="px-8 py-20 text-center">
                                <div class="text-3xl mb-4">🧊</div>
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">No Operational Records Match Query</p>
                            </td>
                        </tr>
                        
                        <!-- DATA ROWS -->
                        <tr th:each="c : ${complaints}" class="group hover:bg-gray-50/80 dark:hover:bg-gray-900/30 transition-all duration-300">
                            <!-- ID -->
                            <td class="px-8 py-6">
                                <span class="font-mono text-[10px] font-black text-gray-400 group-hover:text-indigo-600 transition-colors" th:text="'#' + ${c.id}"></span>
                            </td>

                            <!-- USER -->
                            <td class="px-8 py-6">
                                <div class="flex flex-col">
                                    <span class="font-black text-gray-900 dark:text-white uppercase tracking-tight" th:text="${c.userName}">Requester</span>
                                    <span class="text-[9px] font-black text-gray-400 uppercase leading-none mt-1" th:text="${#temporals.format(c.createdAt,'dd MMM yyyy')} ?: 'N/A'"></span>
                                </div>
                            </td>

                            <!-- ISSUE -->
                            <td class="px-8 py-6 max-w-xs">
                                <div class="flex flex-col gap-1">
                                    <a th:href="@{'/complaint/' + ${c.id}}" class="font-black text-gray-900 dark:text-white uppercase tracking-tight hover:text-indigo-600 transition-colors" th:text="${c.title}"></a>
                                    <p class="text-[10px] font-bold text-gray-500 dark:text-gray-400 truncate" th:text="${c.description}"></p>
                                </div>
                            </td>

                            <!-- STATUS -->
                            <td class="px-8 py-6">
                                <div class="flex justify-center">
                                    <span class="px-4 py-1.5 text-[9px] font-black uppercase tracking-[0.2em] rounded-xl shadow-sm border border-transparent"
                                          th:text="${c.status}"
                                          th:classappend="
                                            ${c.status == 'New' || c.status == 'Open'} ? 'bg-indigo-50 text-indigo-600 shadow-indigo-500/10 border-indigo-100' :
                                            (${c.status == 'Pending' || c.status == 'Under Review'} ? 'bg-amber-50 text-amber-600 shadow-amber-500/10 border-amber-100' :
                                            (${c.status == 'Solved' || c.status == 'Resolved'} ? 'bg-emerald-50 text-emerald-600 shadow-emerald-500/10 border-emerald-100' :
                                            'bg-rose-50 text-rose-600 shadow-rose-500/10 border-rose-100'))">
                                    </span>
                                </div>
                            </td>

                            <!-- SLA PULSE -->
                            <td class="px-8 py-6 text-center">
                                <div th:if="${c.status != 'Resolved' && c.status != 'Solved' && c.status != 'Denied'}" class="flex flex-col items-center gap-1">
                                    <div th:if="${c.isSlaBreached()}" class="px-3 py-1 bg-rose-50 text-rose-600 border border-rose-100 rounded-lg text-[9px] font-black uppercase tracking-widest animate-pulse">
                                        🚨 CRITICAL
                                    </div>
                                    <div th:unless="${c.isSlaBreached()}" class="px-3 py-1 bg-indigo-50 text-indigo-600 border border-indigo-100 rounded-lg text-[9px] font-black uppercase tracking-widest">
                                        ⏳ <span th:text="${c.getHoursToSla()}">0</span>H
                                    </div>
                                </div>
                                <div th:if="${c.status == 'Resolved' || c.status == 'Solved' || c.status == 'Denied'}" class="text-[9px] font-black text-gray-300 uppercase tracking-widest">
                                    NOMINAL
                                </div>
                            </td>

                            <!-- ASSIGNED -->
                            <td class="px-8 py-6">
                                <div th:if="${c.assignedStaff != null}" class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-xl bg-indigo-50 dark:bg-indigo-900/30 flex items-center justify-center text-[10px] text-indigo-600 dark:text-indigo-400 font-black shadow-inner">👤</div>
                                    <span class="text-[10px] font-black text-gray-700 dark:text-gray-300 uppercase tracking-widest" th:text="${c.assignedStaff.name}">Staff</span>
                                </div>
                                <span th:if="${c.assignedStaff == null}" class="text-[9px] font-black text-gray-400 uppercase italic tracking-widest">Unassigned</span>
                            </td>

                            <!-- ACTIONS -->
                            <td class="px-8 py-6">
                                <div class="flex flex-col gap-2 opacity-40 group-hover:opacity-100 transition-all duration-500 max-w-[200px] ml-auto">
                                    <!-- CSRF Token -->
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    
                                    <!-- ASSIGN STAFF -->
                                    <form th:action="@{'/admin/assign/' + ${c.id}}" method="post" class="flex items-center gap-2">
                                        <select name="staffId" class="bg-gray-100 dark:bg-gray-900 border-0 rounded-xl px-3 py-2 text-[9px] font-black uppercase tracking-widest text-gray-700 dark:text-gray-300 ring-1 ring-gray-200 dark:ring-gray-700 flex-1 cursor-pointer">
                                            <option value="0">Agent Selection</option>
                                            <option th:each="s : ${staffList}" th:value="${s.id}" th:text="${s.name}" th:selected="${c.assignedStaff != null and s.id == c.assignedStaff.id}"></option>
                                        </select>
                                        <button type="submit" class="bg-indigo-600 text-white p-2 rounded-xl hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-500/20">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                                        </button>
                                    </form>

                                    <!-- UPDATE STATUS -->
                                    <form th:action="@{'/admin/status/' + ${c.id}}" method="post" class="flex items-center gap-2">
                                        <select name="status" class="bg-gray-100 dark:bg-gray-900 border-0 rounded-xl px-3 py-2 text-[9px] font-black uppercase tracking-widest text-gray-700 dark:text-gray-300 ring-1 ring-gray-200 dark:ring-gray-700 flex-1 cursor-pointer">
                                            <option th:selected="${c.status == 'New'}">New</option>
                                            <option th:selected="${c.status == 'Under Review'}">Under Review</option>
                                            <option th:selected="${c.status == 'Resolved'}">Resolved</option>
                                            <option th:selected="${c.status == 'Denied'}">Denied</option>
                                        </select>
                                        <button type="submit" class="bg-emerald-600 text-white p-2 rounded-xl hover:bg-emerald-700 transition-colors shadow-lg shadow-emerald-500/20">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Enhanced Pagination -->
            <div th:if="${totalPages > 1}" class="px-8 py-6 bg-gray-50/50 dark:bg-gray-900/40 border-t dark:border-gray-700 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Archive Portal</span>
                    <span class="w-1 h-1 bg-gray-300 rounded-full"></span>
                    <span class="text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-tight">
                        Node <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span>
                    </span>
                </div>
                <div class="flex gap-3">
                    <a th:if="${currentPage > 0}" th:href="@{/admin/user-complaints(page=${currentPage - 1}, keyword=${param.keyword}, status=${param.status})}"
                       class="px-6 py-2.5 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-2xl text-[9px] font-black uppercase tracking-widest text-gray-600 dark:text-gray-300 hover:border-indigo-500 hover:text-indigo-600 transition-all shadow-sm">Previous Epoch</a>
                    <a th:if="${currentPage + 1 < totalPages}" th:href="@{/admin/user-complaints(page=${currentPage + 1}, keyword=${param.keyword}, status=${param.status})}"
                       class="px-6 py-2.5 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-2xl text-[9px] font-black uppercase tracking-widest text-gray-600 dark:text-gray-300 hover:border-indigo-500 hover:text-indigo-600 transition-all shadow-sm">Next Epoch</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
