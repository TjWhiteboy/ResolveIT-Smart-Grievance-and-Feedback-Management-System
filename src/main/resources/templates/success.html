<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Success - ResolvIt</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  
  .container {
    background: white;
    padding: 50px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    text-align: center;
    max-width: 500px;
  }
  
  .success-icon {
    font-size: 4em;
    color: #11998e;
    margin-bottom: 20px;
  }
  
  h1 {
    color: #333;
    font-size: 2.5em;
    margin-bottom: 15px;
  }
  
  p {
    color: #666;
    font-size: 1.1em;
    margin-bottom: 30px;
    line-height: 1.6;
  }
  
  .button-group {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .btn {
    padding: 12px 30px;
    font-size: 1em;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s ease;
    display: inline-block;
  }
  
  .btn-primary {
    background: #11998e;
    color: white;
  }
  
  .btn-primary:hover {
    background: #0f8a7a;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
  }
  
  .btn-secondary {
    background: #667eea;
    color: white;
  }
  
  .btn-secondary:hover {
    background: #5568d3;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
  }
  
  .ticket-info {
    background: #f5f5f5;
    padding: 20px;
    border-radius: 8px;
    margin: 30px 0;
    border-left: 4px solid #11998e;
  }
  
  .ticket-info h3 {
    color: #333;
    margin-bottom: 10px;
  }
  
  .ticket-info p {
    color: #666;
    font-size: 0.95em;
    margin: 8px 0;
  }
</style>
</head>
<body>

<div class="container">
  <div class="success-icon">✓</div>
  <h1>Complaint Submitted!</h1>
  <p>Thank you for submitting your complaint. Our team will review it and get back to you shortly.</p>
  
  <div class="ticket-info">
    <h3>What's Next?</h3>
    <p>✓ Your complaint has been recorded in our system</p>
    <p>✓ You can track its status anytime by logging in</p>
    <p>✓ We will notify you once it's resolved</p>
  </div>
  
  <div class="button-group">
    <a href="complaint.html" class="btn btn-primary">Submit Another</a>
    <a href="home.html" class="btn btn-secondary">Go Home</a>
  </div>
</div>

</body>
</html>
