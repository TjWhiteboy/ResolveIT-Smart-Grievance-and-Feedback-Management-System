<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Node Not Found | ResolveIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen flex items-center justify-center p-6 transition-colors duration-300">
    <div class="max-w-md w-full text-center space-y-8">
        <div class="relative inline-block">
            <h1 class="text-[12rem] font-black leading-none opacity-10 dark:opacity-5 select-none">404</h1>
            <div class="absolute inset-0 flex items-center justify-center">
                <span class="text-4xl font-black gradient-text uppercase tracking-widest">Missing Node</span>
            </div>
        </div>
        
        <div class="space-y-4">
            <h2 class="text-2xl font-black text-slate-800 dark:text-white uppercase tracking-tight">System Routing Error</h2>
            <p class="text-slate-500 dark:text-slate-400 font-medium leading-relaxed">
                The requested terminal endpoint does not exist or has been decommissioned. Returning to primary uplink is recommended.
            </p>
        </div>

        <div class="pt-8">
            <a href="/dashboard" class="inline-flex items-center justify-center px-8 py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-indigo-500/20 hover:bg-indigo-700 hover:-translate-y-1 transition-all active:scale-95 group">
                Re-establish Uplink
                <svg class="w-4 h-4 ml-3 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
            </a>
        </div>
        
        <p class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400/50 pt-12">
            ResolveIT Grid Response Code: ERR_PLANE_NOT_FOUND
        </p>
    </div>

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</body>
</html>
