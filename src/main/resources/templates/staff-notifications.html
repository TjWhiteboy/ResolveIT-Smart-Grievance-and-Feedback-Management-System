<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<head>
    <title>Notifications - ResolveIT</title>
</head>
<body>
    <div th:fragment="content" class="max-w-4xl mx-auto space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b dark:border-gray-700 pb-8">
            <div class="space-y-1">
                <h1 class="text-3xl font-black tracking-tighter text-gray-900 dark:text-white uppercase">Operational Signals</h1>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em]">Real-Time Directive & Assignment Flashes</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="markAllNotificationsRead(event)" class="px-6 py-3 bg-white dark:bg-gray-800 text-indigo-600 dark:text-indigo-400 border dark:border-gray-700 rounded-2xl text-[9px] font-black uppercase tracking-widest hover:border-indigo-500 transition-all shadow-sm active:scale-95 group">
                    Mark All As Resolved <span class="group-hover:translate-x-1 transition-transform inline-block">→</span>
                </button>
            </div>
        </div>

        <!-- Notification Feed -->
        <div class="bg-white dark:bg-gray-800 rounded-[2.5rem] border dark:border-gray-700 shadow-2xl shadow-indigo-500/5 overflow-hidden ring-1 ring-gray-100 dark:ring-gray-700">
            <div th:each="n, iter : ${notifications}" 
                 class="p-8 border-b dark:border-gray-700 last:border-0 hover:bg-gray-50/50 dark:hover:bg-gray-900/30 transition-all duration-300 flex gap-6 items-start relative group animate-in slide-in-from-left duration-500"
                 th:style="'animation-delay:' + ${iter.index * 50} + 'ms'">
                
                <div th:unless="${n.isRead}" class="absolute top-0 bottom-0 left-0 w-1.5 bg-indigo-600 shadow-[2px_0_10px_rgba(79,70,229,0.3)]"></div>
                
                <div class="w-14 h-14 rounded-2xl flex-shrink-0 flex items-center justify-center bg-gray-50 dark:bg-gray-900 text-xl shadow-inner group-hover:scale-110 transition-transform duration-500">
                    <span th:text="${n.message.contains('Assigned') ? '👤' : (n.message.contains('SLA') ? '⚠️' : '📢')}">📢</span>
                </div>
                
                <div class="flex-1 w-full space-y-2">
                    <div class="flex items-center justify-between">
                        <span class="text-[9px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-[0.2em]" th:text="${n.message.contains('Assigned') ? 'Assignment Signal' : 'System Directive'}">Signal</span>
                        <span class="text-[9px] font-mono font-black text-gray-400 uppercase tracking-widest" th:text="${#temporals.format(n.createdAt, 'dd MMM, HH:mm')}"></span>
                    </div>
                    <p class="text-sm tracking-tight leading-relaxed text-gray-900 dark:text-white font-black group-hover:translate-x-1 transition-transform" 
                       th:classappend="${!n.isRead} ? 'opacity-100' : 'opacity-60'" 
                       th:text="${n.message}">Message</p>
                </div>

                <div class="opacity-0 group-hover:opacity-100 transition-opacity absolute right-8 top-1/2 -translate-y-1/2">
                    <svg class="w-5 h-5 text-indigo-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"/></svg>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(notifications)}" class="p-24 text-center space-y-6">
                <div class="w-20 h-20 bg-gray-50 dark:bg-gray-900 text-3xl rounded-[2rem] flex items-center justify-center mx-auto shadow-inner">🧊</div>
                <div class="space-y-1">
                    <h3 class="text-gray-900 dark:text-white font-black uppercase tracking-widest text-xs">Awaiting New Signals</h3>
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.1em]">Your operational queue is currently synchronized.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
