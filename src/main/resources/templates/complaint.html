<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Complaint - ResolvIt</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 500px;
    }

    h2 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1em;
      font-family: Arial, sans-serif;
      transition: border-color 0.3s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #11998e;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #0f8a7a;
    }

    .links {
      margin-top: 20px;
      text-align: center;
    }

    .links a {
      color: #667eea;
      text-decoration: none;
      margin: 0 10px;
      transition: color 0.3s;
    }

    .links a:hover {
      color: #5568d3;
      text-decoration: underline;
    }

    .upload-section {
      margin-bottom: 20px;
    }

    .upload-section label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: bold;
      font-size: 1em;
    }

    .upload-box {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      background: #fafafa;
    }

    .upload-box:hover {
      border-color: #667eea;
      background: #f0f2ff;
    }

    .upload-box h4 {
      color: #333;
      margin-bottom: 6px;
      font-size: 1em;
    }

    .upload-box p {
      color: #888;
      font-size: 0.85em;
      margin-bottom: 14px;
    }

    .upload-btn {
      display: inline-block;
      padding: 8px 22px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9em;
      color: #333;
      transition: all 0.2s;
    }

    .upload-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    #file-name {
      margin-top: 10px;
      font-size: 0.85em;
      color: #11998e;
      font-weight: bold;
    }

    .visibility-group {
      display: flex;
      gap: 16px;
      margin-top: 6px;
    }

    .visibility-option {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
    }

    .visibility-option:has(input:checked) {
      border-color: #667eea;
      background: #f0f2ff;
    }

    .visibility-option input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      flex-shrink: 0;
    }

    .visibility-label-text strong {
      display: block;
      font-size: 0.95em;
      color: #333;
    }

    .visibility-label-text span {
      font-size: 0.78em;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Submit Complaint</h2>

    <form id="complaintForm" action="/form/complaint" method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="title" placeholder="Enter complaint subject" required>
      </div>

      <div class="form-group">
        <label for="description">Description:</label>
        <textarea id="description" name="description" placeholder="Describe your complaint in detail"
          required></textarea>
      </div>

      <div class="form-group">
        <label for="category">Category:</label>
        <input type="text" id="category" name="category" placeholder="e.g., Service, Product, Other" required>
      </div>

      <div class="form-group">
        <label for="urgency">Urgency Level:</label>
        <select id="urgency" name="urgency" title="Select urgency level" required>
          <option value="">-- Select --</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </div>

      <div class="form-group">
        <label>Visibility:</label>
        <div class="visibility-group">
          <label class="visibility-option">
            <input type="radio" name="visibility" value="Public" checked>
            <div class="visibility-label-text">
              <strong>🌐 Public</strong>
              <span>Your name will be visible</span>
            </div>
          </label>
          <label class="visibility-option">
            <input type="radio" name="visibility" value="Anonymous">
            <div class="visibility-label-text">
              <strong>🕵️ Anonymous</strong>
              <span>Your identity will be hidden</span>
            </div>
          </label>
        </div>
      </div>

      <input type="hidden" id="userId" name="userId" value="0">

      <div class="upload-section">
        <label>Attachments (Optional)</label>
        <div class="upload-box" onclick="document.getElementById('attachment').click()">
          <h4>Add Media</h4>
          <p>Attach images or files to support your complaint.</p>
          <span class="upload-btn">Upload</span>
          <input type="file" id="attachment" name="attachment" accept="image/*,.pdf,.doc,.docx,.txt"
            style="display:none" onchange="showFileName(this)">
          <div id="file-name"></div>
        </div>
      </div>

      <button type="submit">Submit Complaint</button>
    </form>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const userId = urlParams.get('user');
      const hiddenInput = document.getElementById('userId');
      if (hiddenInput && userId) {
        hiddenInput.value = userId;
      }

      function showFileName(input) {
        const fileNameDiv = document.getElementById('file-name');
        if (input.files && input.files.length > 0) {
          fileNameDiv.textContent = '📎 ' + input.files[0].name;
        } else {
          fileNameDiv.textContent = '';
        }
      }
    </script>

    <div class="links">
      <a href="home.html">Home</a>
      <a href="login.html">Logout</a>
    </div>
  </div>

</body>

</html>
