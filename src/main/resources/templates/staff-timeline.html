<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<head>
    <title th:text="${pageTitle} + ' - ResolveIT'">Timeline</title>
</head>
<body>
    <div th:fragment="content" class="max-w-4xl mx-auto space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b dark:border-gray-700 pb-8">
            <div class="space-y-1">
                <h1 class="text-3xl font-black tracking-tighter text-gray-900 dark:text-white uppercase" th:text="${pageTitle}">Operational Audit</h1>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em]" th:text="${pageSubtitle}">Temporal Activity Pulse</p>
            </div>
        </div>

        <!-- Vertical Timeline Loop -->
        <div class="relative ml-6 border-l-2 border-gray-100 dark:border-gray-800 pl-10 py-4 space-y-12">
            <div th:each="h, iter : ${histories}" class="relative group animate-in slide-in-from-left duration-500" 
                 th:style="'animation-delay:' + ${iter.index * 50} + 'ms'">
                
                <!-- Timeline Node -->
                <div class="absolute -left-[58px] top-6 w-12 h-12 bg-white dark:bg-gray-900 rounded-2xl flex items-center justify-center ring-8 ring-gray-50/50 dark:ring-gray-950/50 shadow-xl group-hover:scale-110 transition-transform duration-500">
                    <span class="text-xl" th:text="${h.status == 'Resolved' ? '✅' : (h.status == 'Denied' ? '❌' : '⚡')}">⚡</span>
                </div>

                <!-- Event Card -->
                <div class="bg-white dark:bg-gray-800 p-8 rounded-[2rem] border dark:border-gray-700 shadow-2xl shadow-indigo-500/5 group-hover:shadow-indigo-500/10 transition-all duration-500 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 rounded-bl-full pointer-events-none group-hover:scale-110 transition-transform"></div>
                    
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 relative z-10">
                        <div class="flex flex-wrap items-center gap-3">
                            <a th:href="@{'/complaint/' + ${h.complaintId}}" 
                               class="px-4 py-1.5 bg-gray-50 dark:bg-gray-900 rounded-xl text-[10px] font-black uppercase tracking-widest text-indigo-600 dark:text-indigo-400 hover:text-indigo-700 transition-colors border dark:border-gray-700 shadow-sm">
                                TICKET #[[${h.complaintId}]]
                            </a>
                            <span class="px-4 py-1.5 text-[9px] font-black uppercase tracking-[0.2em] rounded-xl shadow-sm border border-transparent"
                                  th:text="${h.status}"
                                  th:classappend="
                                    ${h.status == 'New' || h.status == 'Open'} ? 'bg-indigo-50 text-indigo-600 border-indigo-100 shadow-indigo-500/5' :
                                    (${h.status == 'Pending' || h.status == 'Under Review'} ? 'bg-amber-50 text-amber-600 border-amber-100 shadow-amber-500/5' :
                                    (${h.status == 'Solved' || h.status == 'Resolved'} ? 'bg-emerald-50 text-emerald-600 border-emerald-100 shadow-emerald-500/5' :
                                    'bg-rose-50 text-rose-600 border-rose-100 shadow-rose-500/5'))">
                            </span>
                        </div>
                        <span class="text-[9px] font-mono font-black text-gray-400 uppercase tracking-widest bg-gray-50 dark:bg-gray-900 px-3 py-1.5 rounded-lg border dark:border-gray-700" 
                              th:text="${#temporals.format(h.updatedAt, 'dd MMM, HH:mm')}"></span>
                    </div>

                    <p class="text-sm tracking-tight leading-relaxed text-gray-700 dark:text-gray-300 font-bold mb-6 italic" th:text="${h.note}">Note</p>
                    
                    <!-- Actor Info -->
                    <div class="pt-6 border-t dark:border-gray-700 flex items-center justify-between relative z-10">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-gray-50 dark:bg-gray-900 flex items-center justify-center text-[11px] font-black text-gray-400 shadow-inner group-hover:scale-110 transition-transform">
                                <span th:text="${#strings.substring(h.updatedBy, 0, 1)}">U</span>
                            </div>
                            <div class="space-y-0.5">
                                <p class="text-[8px] font-black text-gray-400 uppercase tracking-[0.2em] leading-none">Intervening Actor</p>
                                <p class="text-[10px] font-black text-gray-800 dark:text-gray-200 uppercase tracking-widest" th:text="${h.updatedBy}"></p>
                            </div>
                        </div>
                        <div class="opacity-0 group-hover:opacity-100 transition-all duration-500 flex items-center gap-2">
                            <span class="text-[8px] font-black text-indigo-500 uppercase tracking-widest">Case Link</span>
                            <div class="w-6 h-6 bg-indigo-50 dark:bg-indigo-900/30 rounded-lg flex items-center justify-center text-indigo-600">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7-7 7"/></svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(histories)}" class="text-center py-24 bg-white dark:bg-gray-800 rounded-[2.5rem] border-2 border-dashed dark:border-gray-700">
                <div class="w-20 h-20 bg-gray-50 dark:bg-gray-900 text-3xl rounded-full flex items-center justify-center mx-auto mb-6 opacity-40">⏳</div>
                <h3 class="text-xs font-black text-gray-900 dark:text-white uppercase tracking-widest">Chronological Void</h3>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.1em] mt-2">No operational history has been recorded in this epoch.</p>
            </div>
        </div>
    </div>
</body>
</html>
