<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::div.content})}">
<head>
    <title>Give Feedback</title>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="content p-6 flex justify-center items-start pt-10">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Give Feedback</h2>
            <p class="text-gray-500 text-sm mb-6">How was your experience resolving complaint #<span class="font-bold text-gray-700" th:text="${complaintId}"></span>?</p>
            
            <form method="post" th:action="@{/feedback/submit}" class="space-y-5">
                <input type="hidden" name="complaintId" th:value="${complaintId}">

                <!-- RATING -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Rating</label>
                    <select name="rating" class="w-full border border-gray-200 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                        <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                        <option value="4">⭐⭐⭐⭐ Good</option>
                        <option value="3">⭐⭐⭐ Average</option>
                        <option value="2">⭐⭐ Poor</option>
                        <option value="1">⭐ Terrible</option>
                    </select>
                </div>

                <!-- COMMENT -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Additional Comments</label>
                    <textarea name="comment" rows="4"
                              placeholder="Tell us what you liked or how we can improve..."
                              class="w-full border border-gray-200 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm resize-none"></textarea>
                </div>

                <div class="pt-2">
                    <button type="submit" class="bg-green-600 hover:bg-green-700 transition-colors text-white font-bold w-full py-3 rounded-lg shadow-sm">
                        Submit Feedback
                    </button>
                    <a href="/my-complaints" class="block text-center mt-4 text-sm text-gray-500 hover:text-gray-700 font-medium transition-colors">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
