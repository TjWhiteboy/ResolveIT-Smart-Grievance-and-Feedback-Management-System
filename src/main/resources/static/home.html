<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResolvIt - Home</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  .container {
    background: white;
    padding: 50px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    text-align: center;
    max-width: 600px;
  }
  
  h1 {
    color: #333;
    margin-bottom: 20px;
    font-size: 2.5em;
  }
  
  p {
    color: #666;
    margin-bottom: 30px;
    font-size: 1.1em;
  }
  
  .button-group {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .btn {
    padding: 12px 30px;
    font-size: 1.1em;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s ease;
    display: inline-block;
  }
  
  .btn-primary {
    background: #667eea;
    color: white;
  }
  
  .btn-primary:hover {
    background: #5568d3;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
  }
  
  .btn-secondary {
    background: #764ba2;
    color: white;
  }
  
  .btn-secondary:hover {
    background: #63408b;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
  }
  
  .btn-success {
    background: #11998e;
    color: white;
  }
  
  .btn-success:hover {
    background: #0f8a7a;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
  }
  
  .features {
    margin-top: 40px;
    text-align: left;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }
  
  .feature {
    background: #f5f5f5;
    padding: 20px;
    border-radius: 8px;
    border-left: 4px solid #667eea;
  }
  
  .feature h3 {
    color: #333;
    margin-bottom: 10px;
  }
  
  .feature p {
    color: #666;
    font-size: 0.95em;
    margin: 0;
  }
</style>
</head>
<body>

<div class="container">
  <h1>🎯 ResolvIt</h1>
  <p>Your Complete Complaint Management Solution</p>
  
  <div class="button-group">
    <a href="login.html" class="btn btn-primary">Login</a>
    <a href="register.html" class="btn btn-secondary">Register Now</a>
  </div>
  
  <div class="features">
    <div class="feature">
      <h3>📝 Easy Registration</h3>
      <p>Quick and simple registration process to get started</p>
    </div>
    <div class="feature">
      <h3>🔐 Secure Login</h3>
      <p>Your account is protected with secure authentication</p>
    </div>
    <div class="feature">
      <h3>📋 Track Complaints</h3>
      <p>Submit and manage your complaints efficiently</p>
    </div>
  </div>
</div>

</body>
</html>
