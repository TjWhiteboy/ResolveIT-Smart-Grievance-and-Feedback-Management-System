<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Complaint - ResolvIt</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 500px;
    }

    h2 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1em;
      font-family: Arial, sans-serif;
      transition: border-color 0.3s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #11998e;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #0f8a7a;
    }

    .links {
      margin-top: 20px;
      text-align: center;
    }

    .links a {
      color: #667eea;
      text-decoration: none;
      margin: 0 10px;
      transition: color 0.3s;
    }

    .links a:hover {
      color: #5568d3;
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Submit Complaint</h2>

    <form id="complaintForm" action="/form/complaint" method="post">
      <div class="form-group">
        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="title" placeholder="Enter complaint subject" required>
      </div>

      <div class="form-group">
        <label for="description">Description:</label>
        <textarea id="description" name="description" placeholder="Describe your complaint in detail"
          required></textarea>
      </div>

      <div class="form-group">
        <label for="category">Category:</label>
        <input type="text" id="category" name="category" placeholder="e.g., Service, Product, Other" required>
      </div>

      <div class="form-group">
        <label for="urgency">Urgency Level:</label>
        <select id="urgency" name="urgency" title="Select urgency level" required>
          <option value="">-- Select --</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </div>

      <button type="submit">Submit Complaint</button>
    </form>

    <script>
      // Grab the query parameter 'user'
      const urlParams = new URLSearchParams(window.location.search);
      const userId = urlParams.get('user');

      // Add a hidden input to the form when the page loads, if the 'user' ID exists
      if (userId) {
        const form = document.getElementById('complaintForm');
        const hiddenInput = document.createElement('input');
        hiddenInput.type = 'hidden';
        hiddenInput.name = 'userId';
        hiddenInput.value = userId;
        form.appendChild(hiddenInput);
      }
    </script>

    <div class="links">
      <a href="home.html">Home</a>
      <a href="login.html">Logout</a>
    </div>
  </div>

</body>

</html>
