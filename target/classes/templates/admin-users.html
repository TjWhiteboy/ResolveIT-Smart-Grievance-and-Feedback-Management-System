<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::div.content})}">
<head>
    <title>Users & Staff</title>
</head>

<body class="bg-gray-50">
    <div class="content p-8 max-w-6xl mx-auto space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div class="space-y-1">
                <h1 class="text-3xl font-black tracking-tight text-gray-900 dark:text-white uppercase transition-all">Identity Control</h1>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em]">System-Wide User & Staff Registry</p>
            </div>
            <div class="flex items-center gap-3 bg-white dark:bg-gray-800 px-5 py-3 rounded-2xl border dark:border-gray-700 shadow-sm">
                <span class="w-2 h-2 bg-indigo-600 rounded-full"></span>
                <span class="text-[10px] font-black text-gray-500 dark:text-gray-400 uppercase tracking-widest" th:text="${users.size()} + ' Registered Entities'"></span>
            </div>
        </div>

        <!-- Directory Table -->
        <div class="bg-white dark:bg-gray-800 rounded-[2.5rem] border dark:border-gray-700 shadow-2xl shadow-indigo-500/5 overflow-hidden ring-1 ring-gray-100 dark:ring-gray-700">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="bg-gray-50/50 dark:bg-gray-900/40 text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] border-b dark:border-gray-700">
                            <th class="px-8 py-5">Verified Agent</th>
                            <th class="px-8 py-5">Communication</th>
                            <th class="px-8 py-5">Privilege Level</th>
                            <th class="px-8 py-5 text-right">Access Modulation</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                        <tr th:each="u : ${users}" class="group hover:bg-gray-50/80 dark:hover:bg-gray-900/30 transition-all duration-300">
                            <td class="px-8 py-6">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-sm font-black shadow-lg shadow-indigo-500/20 group-hover:scale-110 transition-transform" th:text="${#strings.substring(u.name, 0, 1)}"></div>
                                    <div class="flex flex-col">
                                        <span class="font-black text-gray-900 dark:text-white uppercase tracking-tight" th:text="${u.name}">Name</span>
                                        <span class="text-[9px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-widest mt-0.5">Active Session</span>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-6 text-gray-500 dark:text-gray-400 font-bold" th:text="${u.email}"></td>
                            <td class="px-8 py-6">
                                <span class="px-4 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-[0.2em] shadow-sm border"
                                      th:text="${u.role}"
                                      th:classappend="
                                        ${u.role == 'ADMIN'} ? 'bg-indigo-600 text-white border-transparent shadow-indigo-500/30' :
                                        (${u.role == 'STAFF'} ? 'bg-amber-500 text-white border-transparent shadow-amber-500/30' :
                                        'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 border-gray-200 dark:border-gray-600')">
                                </span>
                            </td>
                            <td class="px-8 py-6">
                                <form th:action="@{'/admin/change-role/' + ${u.id}}" method="post" class="flex justify-end gap-2 items-center opacity-40 group-hover:opacity-100 transition-opacity">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <select name="role" class="bg-gray-100 dark:bg-gray-900 border-0 rounded-xl px-4 py-2 text-[9px] font-black uppercase tracking-widest text-gray-700 dark:text-gray-300 ring-1 ring-gray-200 dark:ring-gray-700 focus:ring-2 focus:ring-indigo-500 appearance-none cursor-pointer transition-all">
                                        <option value="USER" th:selected="${u.role == 'USER'}">USER</option>
                                        <option value="STAFF" th:selected="${u.role == 'STAFF'}">STAFF</option>
                                        <option value="ADMIN" th:selected="${u.role == 'ADMIN'}">ADMIN</option>
                                    </select>
                                    <button class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-4 py-2 text-[9px] font-black uppercase tracking-widest rounded-xl hover:scale-105 active:scale-95 transition-all shadow-sm">
                                        Modulate
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Enhanced Pagination -->
            <div th:if="${totalPages > 1}" class="px-8 py-6 bg-gray-50/50 dark:bg-gray-900/40 border-t dark:border-gray-700 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Navigation Portal</span>
                    <span class="w-1 h-1 bg-gray-300 rounded-full"></span>
                    <span class="text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-tight">
                        Node <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span>
                    </span>
                </div>
                <div class="flex gap-3">
                    <a th:if="${currentPage > 0}" th:href="@{/admin/users(page=${currentPage - 1})}"
                       class="px-6 py-2.5 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-2xl text-[9px] font-black uppercase tracking-widest text-gray-600 dark:text-gray-300 hover:border-indigo-500 hover:text-indigo-600 transition-all shadow-sm">Previous Sequence</a>
                    <a th:if="${currentPage + 1 < totalPages}" th:href="@{/admin/users(page=${currentPage + 1})}"
                       class="px-6 py-2.5 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-2xl text-[9px] font-black uppercase tracking-widest text-gray-600 dark:text-gray-300 hover:border-indigo-500 hover:text-indigo-600 transition-all shadow-sm">Next Sequence</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
