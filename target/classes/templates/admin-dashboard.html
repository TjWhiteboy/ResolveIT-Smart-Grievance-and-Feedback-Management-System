<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::div.content})}">
<head>
    <title>Admin Dashboard - ResolveIT</title>
</head>
<body class="bg-gray-50">

    <div class="content p-6">

    <div class="content p-6 space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <!-- Page Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="space-y-1">
                <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white flex items-center gap-3">
                    <span class="text-rose-600 bg-rose-50 dark:bg-rose-900/20 p-2 rounded-xl">🛡️</span>
                    <span>Admin Command Center</span>
                </h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm font-medium">Global oversight and system-wide grievance analytics.</p>
            </div>
            <div class="flex items-center gap-3">
                <a href="/admin/user-complaints" class="px-5 py-2.5 bg-gray-900 dark:bg-gray-700 hover:bg-black text-white text-sm font-bold rounded-xl shadow-lg transition-all hover:-translate-y-0.5 active:scale-95 flex items-center gap-2 group">
                    <span class="group-hover:rotate-12 transition-transform">⚙️</span> System Settings
                </a>
            </div>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border dark:border-gray-700 shadow-sm hover:shadow-xl hover:shadow-rose-500/5 transition-all group border-b-4 border-b-rose-600">
                <div class="flex items-center justify-between mb-4">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Active Issues</p>
                    <span class="text-rose-600 bg-rose-50 dark:bg-rose-900/20 p-2 rounded-lg group-hover:rotate-12 transition-transform">🔥</span>
                </div>
                <div class="flex items-end gap-3">
                    <p class="text-4xl font-black text-gray-900 dark:text-white" th:text="${#lists.size(complaints.?[status == 'Open' || status == 'Pending' || status == 'New'])}">0</p>
                </div>
            </div>
            
            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border dark:border-gray-700 shadow-sm hover:shadow-xl hover:shadow-emerald-500/5 transition-all group border-b-4 border-b-emerald-500">
                <div class="flex items-center justify-between mb-4">
                    <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Resolved</p>
                    <span class="text-emerald-500 bg-emerald-50 dark:bg-emerald-900/20 p-2 rounded-lg group-hover:rotate-12 transition-transform">💎</span>
                </div>
                <div class="flex items-end gap-3">
                    <p class="text-4xl font-black text-gray-900 dark:text-white" th:text="${#lists.size(complaints.?[status == 'Resolved' || status == 'Solved'])}">0</p>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border dark:border-gray-700 shadow-sm hover:shadow-xl hover:shadow-sky-500/5 transition-all group border-b-4 border-b-sky-500">
                <div class="flex items-center justify-between mb-4">
                    <p class="text-[10px] font-black text-sky-500 uppercase tracking-widest">System Load</p>
                    <span class="text-sky-500 bg-sky-50 dark:bg-sky-900/20 p-2 rounded-lg group-hover:rotate-12 transition-transform">🚀</span>
                </div>
                <div class="flex items-end gap-3"><p class="text-4xl font-black text-gray-900 dark:text-white" th:text="${#lists.size(complaints)}">0</p>
                <span class="text-[10px] font-bold text-gray-400 uppercase">Total</span></div>
            </div>

            <div class="p-6 rounded-2xl border shadow-sm hover:shadow-xl transition-all group border-b-4"
                 th:classappend="${slaBreaches > 0} ? 'bg-rose-50/50 border-rose-600 dark:bg-rose-900/10 dark:border-rose-900/30 shadow-rose-500/10' : 'bg-gray-900 dark:bg-gray-950 border-gray-800 shadow-gray-900/20 text-white'">
                <div class="flex items-center justify-between mb-4">
                    <p class="text-[10px] font-black uppercase tracking-widest" th:classappend="${slaBreaches > 0} ? 'text-rose-600 dark:text-rose-400' : 'text-gray-400'">Global Health</p>
                    <span class="p-2 rounded-lg" th:classappend="${slaBreaches > 0} ? 'text-rose-600 bg-rose-100 animate-pulse' : 'text-white bg-white/10'">⚡</span>
                </div>
                <div class="flex items-end gap-3">
                    <p class="text-4xl font-black" th:classappend="${slaBreaches > 0} ? 'text-rose-600 dark:text-rose-400' : 'text-white'" th:text="${slaBreaches}">0</p>
                    <span class="text-[10px] font-black uppercase tracking-tighter" th:classappend="${slaBreaches > 0} ? 'text-rose-400' : 'text-emerald-400'" th:text="${slaBreaches > 0} ? 'BREACHED' : 'NOMINAL'">NOMINAL</span>
                </div>
            </div>
        </div>

        <!-- RECENT -->
        <div class="bg-white dark:bg-gray-800 rounded-3xl border dark:border-gray-700 shadow-sm overflow-hidden flex flex-col hover:shadow-lg transition-shadow">
            <div class="px-8 py-6 border-b dark:border-gray-700 flex items-center justify-between bg-gray-50/50 dark:bg-gray-900/20">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 bg-rose-600 rounded-full animate-ping"></div>
                    <h2 class="font-black text-gray-900 dark:text-white uppercase tracking-widest text-sm">Real-time Stream</h2>
                </div>
                <a href="/admin/user-complaints" class="text-[10px] font-black text-rose-600 hover:text-rose-700 uppercase tracking-[0.1em] px-3 py-1 bg-rose-50 dark:bg-rose-900/20 rounded-full transition-colors">Global Monitor</a>
            </div>
            
            <div class="flex-1 overflow-y-auto">
                <table class="w-full text-left text-sm border-collapse">
                    <tbody class="divide-y dark:divide-gray-700">
                        <tr th:each="c : ${complaints}" class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors group">
                            <td class="px-8 py-5">
                                <div class="flex items-center gap-4">
                                    <div class="p-2.5 bg-gray-100 dark:bg-gray-700 rounded-xl group-hover:bg-rose-600 group-hover:text-white transition-colors">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    </div>
                                    <div>
                                        <a th:href="@{'/complaint/' + ${c.id}}" class="font-bold text-gray-900 dark:text-white hover:text-rose-600 transition-colors block truncate w-64 max-w-sm" th:text="${c.title}">Title</a>
                                        <div class="flex items-center gap-2 mt-1">
                                            <span class="text-[10px] font-black text-rose-600 dark:text-rose-400 uppercase tracking-widest">ID: [[${c.id}]]</span>
                                            <span class="text-gray-300 dark:text-gray-600">•</span>
                                            <span class="text-[10px] text-gray-500 font-medium" th:text="${#temporals.format(c.createdAt, 'dd MMM, HH:mm')}">Date</span>
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-5 text-right">
                                <span class="text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest shadow-sm"
                                      th:text="${c.status}"
                                      th:classappend="
                                        ${c.status == 'Open' || c.status == 'Pending' || c.status == 'New'} ? 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/40 dark:text-yellow-400' :
                                        (${c.status == 'Resolved' || c.status == 'Solved'} ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400' :
                                        (${c.status == 'Denied'} ? 'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-400' : 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300'))">
                                </span>
                            </td>
                            <td class="px-8 py-5 text-right">
                                <a th:href="@{'/complaint/' + ${c.id}}" class="inline-flex items-center gap-2 px-5 py-2 bg-gray-900 dark:bg-gray-700 text-white rounded-xl text-xs font-bold hover:bg-rose-600 transition-all hover:shadow-lg active:scale-95 group/btn">
                                    Manage <svg class="w-3 h-3 transform group-hover/btn:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    </div>

</body>
</html>
