<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<head>
    <title>My Profile - ResolveIT</title>
</head>
<body>
    <div th:fragment="content" class="max-w-4xl mx-auto space-y-12 animate-in fade-in slide-in-from-bottom-6 duration-1000">
        
        <!-- Flash Alerts -->
        <div th:if="${param.success}" class="p-5 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-800 rounded-[2rem] flex items-center gap-4 shadow-xl shadow-emerald-500/5 group">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-white text-xl shadow-lg shadow-emerald-500/30 group-hover:rotate-12 transition-transform">✓</div>
            <span class="text-[11px] font-black text-emerald-700 dark:text-emerald-400 uppercase tracking-widest" th:text="${param.success}">Protocol Successful</span>
        </div>

        <!-- Identity Banner -->
        <div class="bg-white dark:bg-gray-800 rounded-[2.5rem] border dark:border-gray-700 shadow-2xl shadow-indigo-500/5 overflow-hidden ring-1 ring-gray-100 dark:ring-gray-700 group">
            <div class="h-44 bg-gradient-to-br from-indigo-600 via-purple-600 to-rose-500 relative">
                <div class="absolute inset-0 bg-black/10 group-hover:opacity-0 transition-opacity duration-1000"></div>
                <div class="absolute bottom-0 left-0 w-full h-24 bg-gradient-to-t from-white/10 to-transparent"></div>
            </div>
            <div class="px-10 pb-10 -mt-20 relative z-10 flex flex-col md:flex-row items-end gap-8">
                <div class="relative group/avatar">
                    <img th:src="${user.profilePic != null} ? @{'/uploads/' + ${user.profilePic}} : '/uploads/default.png'"
                         class="w-40 h-40 rounded-[2.5rem] object-cover border-8 border-white dark:border-gray-800 shadow-2xl group-hover/avatar:rotate-2 transition-all duration-700"
                         alt="Profile">
                    <div class="absolute -right-2 -bottom-2 w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl border-4 border-white dark:border-gray-800">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    </div>
                </div>
                
                <div class="flex-1 pb-2 space-y-2">
                    <div class="flex items-center gap-4">
                        <h1 class="text-4xl font-black tracking-tighter text-gray-900 dark:text-white uppercase leading-none" th:text="${user.name}">Identity Name</h1>
                        <span class="px-5 py-1.5 bg-indigo-50 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400 rounded-xl text-[10px] font-black uppercase tracking-[0.3em] shadow-sm" th:text="${user.role}">Role</span>
                    </div>
                    <div class="flex flex-wrap gap-6 pt-2">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            <span class="text-[11px] font-black text-gray-500 uppercase tracking-widest" th:text="${user.email}">email@system.id</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            <span class="text-[11px] font-black text-gray-500 uppercase tracking-widest" th:text="'Initiated ' + ${#temporals.format(user.createdAt, 'MMM yyyy')}">Date</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <!-- Core Intelligence -->
            <div class="bg-white dark:bg-gray-800 rounded-[2.5rem] border dark:border-gray-700 shadow-2xl shadow-indigo-500/5 p-10 space-y-8">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-50 dark:bg-indigo-900/30 flex items-center justify-center text-2xl shadow-inner">📡</div>
                    <div class="space-y-0.5">
                        <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em]">Identity Matrix</h2>
                        <p class="text-sm font-black text-gray-900 dark:text-white uppercase tracking-tight">Core Metadata</p>
                    </div>
                </div>

                <form th:action="@{/profile/update}" method="post" enctype="multipart/form-data" class="space-y-6">
                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Alias / Full Name</label>
                            <input type="text" name="name" th:value="${user.name}" required 
                                   class="w-full bg-gray-50 dark:bg-gray-900/50 border-0 rounded-2xl px-6 py-4 text-sm font-black text-gray-900 dark:text-white tracking-tight focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Communication Channel</label>
                            <input type="email" name="email" th:value="${user.email}" required
                                   class="w-full bg-gray-50 dark:bg-gray-900/50 border-0 rounded-2xl px-6 py-4 text-sm font-black text-gray-900 dark:text-white tracking-tight focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Identity Visual</label>
                            <div class="flex items-center gap-3">
                                <label class="flex-1 flex items-center gap-3 px-6 py-4 bg-gray-50 dark:bg-gray-900/50 border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-2xl cursor-pointer hover:border-indigo-500 transition-all group">
                                    <svg class="w-5 h-5 text-gray-400 group-hover:text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                                    <span class="text-[10px] font-black text-gray-500 group-hover:text-indigo-500 uppercase tracking-widest" id="fileLabel">Upload Avatar</span>
                                    <input type="file" name="profilePic" accept="image/*" class="hidden" onchange="document.getElementById('fileLabel').textContent = this.files[0]?.name">
                                </label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] shadow-xl shadow-indigo-500/20 hover:bg-indigo-700 active:scale-95 transition-all">Synchronize Matrix</button>
                </form>
            </div>

            <!-- Security Protocols -->
            <div class="bg-white dark:bg-gray-800 rounded-[2.5rem] border dark:border-gray-700 shadow-2xl shadow-indigo-500/5 p-10 space-y-8">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-emerald-50 dark:bg-emerald-900/30 flex items-center justify-center text-2xl shadow-inner">🔐</div>
                    <div class="space-y-0.5">
                        <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em]">Access Security</h2>
                        <p class="text-sm font-black text-gray-900 dark:text-white uppercase tracking-tight">Credential Rotation</p>
                    </div>
                </div>

                <form th:action="@{/profile/change-password}" method="post" class="space-y-6">
                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Current Passcode</label>
                            <input type="password" name="oldPassword" required
                                   class="w-full bg-gray-50 dark:bg-gray-900/50 border-0 rounded-2xl px-6 py-4 text-sm font-black tracking-widest focus:ring-2 focus:ring-emerald-500 transition-all outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">New Directive</label>
                            <input type="password" name="newPassword" required minlength="6"
                                   class="w-full bg-gray-50 dark:bg-gray-900/50 border-0 rounded-2xl px-6 py-4 text-sm font-black tracking-widest focus:ring-2 focus:ring-emerald-500 transition-all outline-none">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-5 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] shadow-xl shadow-emerald-500/20 hover:bg-emerald-700 active:scale-95 transition-all">Rotate Access Gate</button>
                </form>

                <!-- Danger Protocol -->
                <div class="pt-8 border-t dark:border-gray-700">
                    <div class="bg-rose-50 dark:bg-rose-900/10 border border-rose-100 dark:border-rose-900/50 p-6 rounded-[2rem] flex flex-col sm:flex-row items-center justify-between gap-6 group/danger">
                        <div class="space-y-1 text-center sm:text-left">
                            <p class="text-[10px] font-black text-rose-600 uppercase tracking-[0.2em]">Zero-Out Protocol</p>
                            <p class="text-[8px] font-bold text-rose-400 uppercase">Irreversible Identity Deletion</p>
                        </div>
                        <form th:action="@{/profile/delete}" method="post" onsubmit="return confirm('Initiate Zero-Out Protocol? This action is absolute.')">
                            <button type="submit" class="px-6 py-3 bg-rose-600 text-white rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-rose-700 shadow-lg shadow-rose-500/20 transition-all active:scale-95">Purge Identity</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
